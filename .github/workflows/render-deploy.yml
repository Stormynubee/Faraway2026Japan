name: Render Deploy

on:
  workflow_run:
    workflows: [CI Pipeline]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_SERVICE_ID" ]; then
            code=$(curl -sS -o /tmp/render-deploy.out -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              -d '{}')
            cat /tmp/render-deploy.out
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "Render deploy triggered via API (HTTP $code)."
              exit 0
            fi
            echo "Render API deploy failed (HTTP $code)."
            exit 1
          fi
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
            echo "Render deploy triggered via deploy hook."
            exit 0
          fi
          echo "Set RENDER_API_KEY + RENDER_SERVICE_ID (preferred) or RENDER_DEPLOY_HOOK — skip auto-deploy."
          exit 0
