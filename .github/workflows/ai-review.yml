name: Pull Request Guard

on:
  pull_request:
    branches: [ main ]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff Lint Check
        run: |
          ruff check server/ || true

      - name: Node.js Lint and Verify
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Dry Run Build Frontend
        run: |
          npm ci
          npm run build

      - name: Post PR Status Comment
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Automated PR Guard static check complete. Code compilation and build validation succeeded.'
            });
