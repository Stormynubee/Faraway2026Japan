name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install frontend dependencies
      run: npm ci

    - name: Build frontend (enables static serving tests)
      run: npm run build

    - name: Run Pytest suite
      run: python -m pytest tests/ -v

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install frontend dependencies
      run: npm ci

    - name: Run Vitest suite
      run: npm run test

    - name: Build frontend React app
      run: npm run build

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [frontend-tests]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t bogie-flow:ci .

    - name: Run container and smoke health + HTML
      run: |
        docker run -d --name bogie-flow-smoke -p 8765:8000 -e PORT=8000 bogie-flow:ci
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8765/api/health; then break; fi
          sleep 2
        done
        curl -sf http://localhost:8765/api/health | grep -q bogie-flow
        curl -sf http://localhost:8765/ | grep -qi html
        docker stop bogie-flow-smoke
